# Default values for the Hugo personal site.
# Override these with your own values files or --set flags.

replicaCount: 2

image:
  repository: ghcr.io/antief/blog
  pullPolicy: IfNotPresent
  # The workflow publishes branch, git tag and sha-* tags. Override with an immutable sha-* tag for production releases.
  tag: "main"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

containerPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

startupProbe:
  enabled: false
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 1
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 12

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: site.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # Example:
  # tls:
  #   - secretName: site-example-com-tls
  #     hosts:
  #       - site.example.com

gateway:
  enabled: false
  parentRefs:
    - name: example-gateway
      namespace: default
      sectionName: http
  hostnames:
    - site.example.com
  matches:
    - path:
        type: PathPrefix
        value: /
  filters: []
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}

env: []
extraVolumes: []
extraVolumeMounts: []

revisionHistoryLimit: 3

updateStrategy:
  type: RollingUpdate

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false
  ingress: []
  egress: []
